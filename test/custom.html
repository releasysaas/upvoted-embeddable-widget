<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Custom mode — Upvoted</title>
    <style>
      body {
        background-color: #dedede;
        font-family: system-ui, sans-serif;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 24px;
        color: #222;
      }
      a.back {
        font-size: 14px;
      }
      button.host-trigger {
        padding: 10px 18px;
        font-size: 15px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button.host-trigger:hover {
        background: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <p><a class="back" href="./index.html">← back</a></p>
    <h1>Custom mode</h1>
    <p>
      No FAB is rendered. The widget binds a click listener to the host-page
      element identified by <code>data-trigger-id</code>.
    </p>

    <p>
      <button id="open-feedback-btn" class="host-trigger" type="button">
        Send us feedback
      </button>
    </p>

    <script
      src="http://127.0.0.1:3334/widget.js"
      defer
      data-mode="custom"
      data-trigger-id="open-feedback-btn"
      data-client-key="XXXX"
      data-class-name="dark"
    ></script>
  </body>
</html>
